<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link
      rel="icon"
      href="https://img.icons8.com/external-frizty-kerismaker/48/external-Calender-internet-advertising-frizty-kerismaker.png"
      type="image/png"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        background-image: linear-gradient(
          126.6deg,
          rgba(44, 115, 210, 1) 3.4%,
          rgba(251, 234, 255, 1) 127.9%
        );
        min-height: 100vh;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .container {
        width: 600px;
        max-width: 90%;
      }
      .title {
        text-align: center;
      }
      .title h1 {
        font-size: 40px;
      }
      .title h2 {
        color: #efd81d;
        font-size: 48px;
      }
      .box {
        background-color: #00000025;
        backdrop-filter: blur(12px);
        padding: 16px 32px;
        border-radius: 4px;
        margin: 16px auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .box input {
        padding: 8px;
        border: none;
        border: 2px solid white;
        border-radius: 4px;
        width: 70%;
        flex-grow: 1;
        transition-duration: 0.3s;
        background-color: transparent;
        color: white;
      }
      .box input:focus {
        outline: none;
        border-color: #efd81d;
      }
      .box button {
        border: none;
        border: 2px solid #efd81d;
        border-radius: 4px;
        background-color: #efd81d;
        padding: 8px 32px;
        font-size: 16px;
        transition-duration: 0.3s;
        cursor: pointer;
      }
      .box button:hover {
        background-color: #bda700;
        border-color: #bda700;
      }
      .result {
        text-align: center;
        margin-top: 20px;
      }
      .result span {
        color: #efd81d;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="title">
        <h1>Age Calculator</h1>
        <h2>JS</h2>
      </div>
      <div class="box">
        <input type="date" placeholder="select you birth date." />
        <button id="calculate">Calculate</button>
      </div>
      <p class="result">
        select your birth date and click the calculate button to see your age in
        years, months, and days.
      </p>
    </div>
  </body>
  <script>
    let calBtn = document.getElementById("calculate");
    let birthDateInput = document.querySelector(".box input");
    let result = document.querySelector(".result");
    birthDateInput.max = new Date().toISOString().split("T")[0];

    calBtn.addEventListener("click", () => {
      if (!birthDateInput.value) {
        alert("Please select your birth date.");
        return;
      }
      let birthDate = new Date(birthDateInput.value);
      let currentDate = new Date();
      let years = currentDate.getFullYear() - birthDate.getFullYear();
      let months = currentDate.getMonth() - birthDate.getMonth();
      let days = currentDate.getDate() - birthDate.getDate();

      if (days < 0) {
        months--;
        // 0 => last day of the previous month
        let lastMonth = new Date(
          currentDate.getFullYear(),
          currentDate.getMonth(),
          0,
        );
        days += lastMonth.getDate();
      }

      if (months < 0) {
        years--;
        months += 12;
      }

      result.innerHTML = `You are <span>${years}</span> years, <span>${months}</span> months, <span>${days}</span> days old.`;
    });

    birthDateInput.addEventListener("blur", (e) => {
      e.preventDefault();
      if (!birthDateInput.value) {
        result.innerHTML =
          "select your birth date and click the calculate button to see your age in years, months, and days.";

        return;
      }
    });
  </script>
</html>
