<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strong Password Generation</title>
    <link
      rel="icon"
      href="https://img.icons8.com/sci-fi/48/lock-2.png"
      type="image/png"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: rgb(0, 17, 43);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .conatiner {
        text-align: center;
        padding: 16px 32px;
        border-radius: 4px;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      }
      #generatePassword {
        margin-top: 16px;
        padding: 10px 20px;
        font-size: 16px;
        color: white;
        background-color: rgb(0, 187, 0);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition-duration: 0.3s;
      }
      #generatePassword:hover {
        background-color: rgb(0, 150, 0);
      }
      #passwordOutput {
        display: block;
        width: 80%;
        padding: 8px 16px;
        margin: 16px auto;
        background-color: transparent;
        color: white;
        border: 2px solid white;
        border-radius: 4px;
        transition-duration: 0.3s;
      }
      #passwordOutput:focus {
        outline: none;
        border-color: rgb(0, 187, 0);
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      #copy {
        background-color: transparent;
        border: none;
        color: white;
        position: absolute;
        right: 32px;
        font-size: 20px;
        cursor: pointer;
        transition-duration: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 8px;
      }
      #copy:hover {
        color: rgb(0, 187, 0);
      }

      #copy svg {
        width: 24px;
        height: 24px;
        display: block;
      }
      .success-toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background-color: rgb(0, 187, 0);
        color: white;
        padding: 10px 20px;
        border-radius: 4px;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 1000;
      }
      .success-toast.show {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div class="conatiner">
      <h1>
        Strong <span style="color: rgb(0, 187, 0)">Password</span> Generation
      </h1>
      <p>
        Click the button below to generate a strong password from 16 digits:
      </p>
      <div class="row">
        <input
          type="text"
          id="passwordOutput"
          readonly
          placeholder="Your Password Will Appear Here."
        />
        <button id="copy">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75"
            />
          </svg>
        </button>
      </div>

      <button id="generatePassword">Generate Password</button>
    </div>

    <div class="success-toast" id="toast">✓ Copied to clipboard!</div>
  </body>

  <script>
    let passwordOutput = document.getElementById("passwordOutput");
    let generateButton = document.getElementById("generatePassword");
    let copy = document.getElementById("copy");
    let toast = document.getElementById("toast");
    let length = 16;

    let SmallCharacters = "abcdefghijklmnopqrstuvwxyz";
    let LargeCharacters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let NumbersAndSymbols = "0123456789!@#$%^&*";
    let AllCharacters =
      "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

    generateButton.addEventListener("click", generate);

    function generate() {
      let password = "";
      passwordOutput.value = "";

      password +=
        LargeCharacters[Math.floor(Math.random() * LargeCharacters.length)];
      password +=
        SmallCharacters[Math.floor(Math.random() * SmallCharacters.length)];
      password +=
        NumbersAndSymbols[Math.floor(Math.random() * NumbersAndSymbols.length)];

      while (password.length < length) {
        password +=
          AllCharacters[Math.floor(Math.random() * AllCharacters.length)];
      }
      passwordOutput.value = password;
    }

    // Store the original copy icon
    const copyIconHTML = copy.innerHTML;

    // Check icon SVG (Heroicon checkmark)
    const checkIconHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
    </svg>`;

    copy.addEventListener("click", async () => {
      if (!passwordOutput.value) {
        showToast("No password to copy!", "#ff2222");
        return;
      }

      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(passwordOutput.value);

          copy.innerHTML = checkIconHTML;
          copy.style.color = "#00bb00";
          showToast("Copied to clipboard!", "#00bb00");
          setTimeout(() => {
            copy.innerHTML = copyIconHTML;
            copy.style.color = "white";
          }, 2000);
        } catch (err) {
          console.warn("Clipboard API error", err);
          showToast("Failed to copy!", "#ff2222");
        }
      }
    });

    function showToast(message, color) {
      toast.textContent = message;
      toast.style.backgroundColor = color;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 2000);
    }
  </script>
</html>
