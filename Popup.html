<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>popup</title>
    <link
      rel="icon"
      href="https://img.icons8.com/fluency/96/instagram-check-mark.png"
      type="image/png"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      .container {
        width: 100%;
        height: 100vh;
        background: linear-gradient(
          to left,
          #ef9393,
          #e17dc2,
          #998ee0,
          #43add0,
          #8bdeda
        );
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      h1 {
        color: #fff;
        font-size: 42px;
        margin-bottom: 20px;
        text-align: center;
      }
      .btn {
        padding: 12px 42px;
        background-color: #ffffff98;
        backdrop-filter: blur(12px);

        border: none;
        outline: none;
        cursor: pointer;
        border-radius: 6px;
        font-size: 22px;
      }
      .popup {
        width: 400px;
        max-width: 95%;
        border-radius: 4px;
        position: absolute;
        top: 0%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.1);
        text-align: center;
        padding: 16px 32px;
        color: #333;
        background-color: #fff;
        visibility: hidden;
        transition-duration: 0.3s;
      }
      .popup.open {
        transform: translate(-50%, -50%) scale(1);
        visibility: visible;
        top: 50%;
      }
      .popup img {
        width: 60px;
        height: 60px;
        margin-top: -46px;
      }
      .popup h2 {
        font-size: 38px;
        margin: 30px 0 10px;
      }
      .popup button {
        width: 100%;
        margin-top: 20px;
        padding: 10px;
        background-color: #1b9de2;
        color: #fff;
        border: none;
        outline: none;
        font-size: 18px;
        border-radius: 4px;
        cursor: pointer;
        box-shadow: 0 5px 5px rgba(0, 0, 0, 0.2);
        transition-duration: 0.3s;
      }
      .popup button:hover {
        background-color: #4db4d1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Click here to submit</h1>
      <button type="submit" class="btn" onclick="openPopup()">submit</button>
      <div class="popup" id="popup">
        <img
          src="https://img.icons8.com/fluency/96/instagram-check-mark.png"
          alt="check"
          width="50"
          height="50"
        />
        <h2>Thank You!</h2>
        <p>Your details has been successfully submitted. Thanks!</p>
        <button type="button" onclick="closePopup()">OK</button>
      </div>
    </div>
    <script>
      let popup = document.getElementById("popup");
      function openPopup() {
        popup.classList.add("open");
      }
      function closePopup() {
        popup.classList.remove("open");
      }
    </script>
  </body>
</html>
