<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="https://img.icons8.com/matisse/100/task.png"
      type="image/png"
    />
    <title>Notes</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(
          135deg,
          #030d24 0%,
          #0e2558 50%,
          #030d24 100%
        );
        color: white;
      }
      .container {
        width: 600px;
        max-width: 90%;
        box-shadow: 0 0 10px black;
        padding: 16px 32px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.041);
        backdrop-filter: blur(12px);
      }
      .title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        border-bottom: 2px solid white;
        padding-bottom: 8px;
      }
      .title .left {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .title .right button {
        border: none;
        padding: 8px 32px;
        background-color: #f79e17;
        color: white;
        border-radius: 20px;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition-duration: 0.3s;
      }
      .title .right button:hover {
        background-color: #000c20;
      }
      .notes {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-top: 18px;
      }
      .notes .note {
        width: 90%;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .notes .note input {
        width: 100%;
        height: 100%;
        margin: 12px 0;
        border: 2px solid white;
        border-radius: 4px;
        padding: 6px 12px;
        background-color: transparent;
        color: white;
        transition-duration: 0.3s;
        font-size: 16px;
      }
      .notes .note input:focus {
        outline: none;
        border-color: #f79e17;
      }
      .notes .note input::placeholder {
        transition-duration: 0.3s;
      }
      .notes .note input:focus::placeholder {
        opacity: 0;
      }
      .notes .button-group {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 4px;
      }

      .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition-duration: 0.3s;
        display: flex;
      }

      .btn-edit {
        background-color: #4caf50;
        color: white;
      }

      .btn-edit:hover {
        background-color: #009207;
      }

      .btn-delete {
        background-color: #f44336;
        color: white;
      }

      .btn-delete:hover {
        background-color: #da190b;
      }

      .empty-state {
        text-align: center;
        padding: 10px;
        color: #dad8d8;
        font-size: 14px;
      }
      .settings {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 2px solid white;
        padding-top: 12px;
        margin-top: 24px;
      }
      .settings #count {
        color: #f79e17;
        font-size: 16px;
        font-weight: bold;
      }
      .settings #clear-all {
        border: none;
        padding: 8px 32px;
        background-color: #000c20;
        color: white;
        border-radius: 20px;
        font-weight: bold;
        font-size: 16px;
        cursor: pointer;
        transition-duration: 0.3s;
      }
      .settings #clear-all:hover {
        background-color: #da190b;
      }
      .settings #clear-all:disabled {
        background-color: #555;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="title">
        <div class="left">
          <img
            width="60"
            height="60"
            src="https://img.icons8.com/matisse/100/task.png"
            alt="task"
          />
          <h1>notes</h1>
        </div>
        <div class="right">
          <button id="add">Add</button>
        </div>
      </div>
      <div class="notes"></div>
      <div class="settings">
        <div id="count"></div>
        <button id="clear-all">Clear All</button>
      </div>
    </div>
  </body>
  <script>
    let notes = [];
    const add = document.getElementById("add");
    const clearAll = document.getElementById("clear-all");

    clearAll.addEventListener("click", clearAllNotes);
    add.addEventListener("click", addNewNote);

    function saveNotesToStorage() {
      localStorage.setItem("mini-js-projects-userNotes", JSON.stringify(notes));
    }

    function loadNotesFromStorage() {
      const savedNotes = localStorage.getItem("mini-js-projects-userNotes");

      if (savedNotes) {
        notes = JSON.parse(savedNotes);
      }
    }

    function addNewNote() {
      const newNote = {
        id: Date.now(),
        text: "",
        isEditing: true,
      };

      notes.forEach((note) => {
        note.isEditing = false;
      });

      notes.push(newNote);

      saveNotesToStorage();
      renderNotes();

      setTimeout(() => {
        const input = document.querySelector(`input[data-id="${newNote.id}"]`);

        if (input) {
          input.focus();
        }
      }, 100);
    }

    function deleteNote(id) {
      if (!confirm("Are you sure you want to delete this note?")) {
        return;
      }

      notes = notes.filter((note) => note.id !== id);

      saveNotesToStorage();
      renderNotes();
    }

    function toggleEdit(id) {
      const note = notes.find((note) => note.id === id);

      if (!note) return;

      if (note.isEditing) {
        const input = document.querySelector(`input[data-id="${id}"]`);

        note.text = input.value.trim();
        note.isEditing = false;

        saveNotesToStorage();
        renderNotes();
      } else {
        notes.forEach((note) => {
          note.isEditing = note.id === id;
        });

        renderNotes();

        setTimeout(() => {
          const input = document.querySelector(`input[data-id="${id}"]`);

          if (input) {
            input.focus();
            input.select();
          }
        }, 100);
      }
    }

    function renderNotes() {
      const notesContainer = document.querySelector(".notes");
      const noteCountSpan = document.getElementById("count");
      noteCountSpan.textContent = `${notes.length} ${notes.length === 1 ? "note" : "notes"}`;

      if (notes.length === 0) {
        notesContainer.innerHTML = `
        <div class="empty-state">
          No notes yet. Click Add to create one.
          </div>
      `;
        clearAll.disabled = true;
        return;
      }

      clearAll.disabled = false;
      notesContainer.innerHTML = notes
        .map(
          (note) => `
          <div class="note">
            <input
              type="text"
              data-id="${note.id}"
              placeholder="write your note here"
              value="${note.text.replace(/"/g, "&quot;")}"
              value="${note.text.replace(/"/g, "&quot;")}"
              ${!note.isEditing ? "readonly" : ""}
              />
              
              <div class="button-group">
                <button
                class="btn btn-edit"
                onclick="toggleEdit(${note.id})"
                >
                <span>${note.isEditing ? "💾" : "✏️"}</span>
                </button>
                
                <button
                class="btn btn-delete"
                onclick="deleteNote(${note.id})"
                >
                <span>🗑️</span>
              </button>
            </div>
          </div>
        `,
        )
        .join("");
    }

    function clearAllNotes() {
      if (!notes.length) {
        return;
      }
      if (
        confirm(
          "Are you sure you want to delete ALL notes? This cannot be undone!",
        )
      ) {
        notes = [];
        saveNotesToStorage();
        renderNotes();
      }
    }

    loadNotesFromStorage();
    renderNotes();
  </script>
</html>
